<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Daily News Briefing — 31 May 2026 · Morning SGT</title>
<meta name="theme-color" content="#fafaf9" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Google Sans isn't on Google Fonts public; DM Sans is the closest free, humanist substitute and matches the elegant intent. -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Anonymous+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ============ elegant — design tokens ============ */
  :root{
    /* Typography */
    --ff-display:'Google Sans','DM Sans',system-ui,-apple-system,sans-serif;
    --ff-body:'Google Sans','DM Sans',system-ui,-apple-system,sans-serif;
    --ff-mono:'Anonymous Pro',ui-monospace,'SF Mono',monospace;
    /* Scale per skill: 14/16/18/24/32/40 */
    --t-xs:14px; --t-sm:16px; --t-md:18px; --t-lg:24px; --t-xl:32px; --t-2xl:40px;
    /* Spacing per skill: 4/8/12/16/24/32 */
    --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px; --s-6:32px;

    /* Surfaces — warm-neutral daylight */
    --bg:#FAFAF9; --surface:#FFFFFF; --surface-2:#F5F5F4;
    --border:#E7E5E4; --border-strong:#D6D3D1; --rule:#EDECEA;
    --text:#111827; --text-soft:#3F3F46; --muted:#71717A; --muted-2:#A1A1AA;

    /* Brand */
    --primary:#3B82F6; --secondary:#8B5CF6;
    --success:#16A34A; --warning:#D97706; --danger:#DC2626;

    /* Per-section accents (mapped to skill tokens) */
    --c-top:#3B82F6; --c-sg:#16A34A; --c-war:#DC2626; --c-health:#8B5CF6; --c-cyber:#D97706;
    --c-top-soft:#EFF6FF; --c-sg-soft:#F0FDF4; --c-war-soft:#FEF2F2;
    --c-health-soft:#F5F3FF; --c-cyber-soft:#FFFBEB;

    /* Severity */
    --sev-crit:#B91C1C; --sev-crit-bg:#FEF2F2; --sev-crit-bd:#FECACA;
    --sev-high:#C2410C; --sev-high-bg:#FFF7ED; --sev-high-bd:#FED7AA;
    --sev-med:#A16207;  --sev-med-bg:#FEFCE8;  --sev-med-bd:#FEF08A;
    --sev-info:#1D4ED8; --sev-info-bg:#EFF6FF; --sev-info-bd:#BFDBFE;

    --maxw:1140px; --header-h:64px;
  }
  html[data-theme="dark"]{
    --bg:#0B0B0C; --surface:#131315; --surface-2:#1A1A1D;
    --border:#2A2A2E; --border-strong:#3A3A40; --rule:#1F1F22;
    --text:#F4F4F5; --text-soft:#D4D4D8; --muted:#A1A1AA; --muted-2:#71717A;

    --c-top:#60A5FA; --c-sg:#4ADE80; --c-war:#F87171; --c-health:#A78BFA; --c-cyber:#FBBF24;
    --c-top-soft:#0F1B2E; --c-sg-soft:#0E2418; --c-war-soft:#2A1313;
    --c-health-soft:#1B1730; --c-cyber-soft:#2A1F0A;

    --sev-crit:#FCA5A5; --sev-crit-bg:#2A1313; --sev-crit-bd:#5A2424;
    --sev-high:#FDBA74; --sev-high-bg:#2A1C10; --sev-high-bd:#5A3A1C;
    --sev-med:#FDE68A;  --sev-med-bg:#28220C;  --sev-med-bd:#564A1F;
    --sev-info:#93C5FD; --sev-info-bg:#0F1B2E; --sev-info-bd:#1E3A8A;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:var(--ff-body); font-size:var(--t-sm); font-weight:400; line-height:1.6;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    transition:background-color .25s, color .25s;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--text);color:var(--bg)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--s-5)}
  .container{max-width:var(--maxw);margin:0 auto;padding:0 var(--s-5) calc(var(--s-6)*2.5)}
  :focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:2px}

  /* ============ masthead ============ */
  header.top{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%, transparent);
    backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--rule)}
  .masthead{display:flex;align-items:center;justify-content:space-between;gap:var(--s-4);
    min-height:var(--header-h);padding:var(--s-3) 0}
  .brand{display:flex;align-items:baseline;gap:var(--s-4);min-width:0}
  .wordmark{font-family:var(--ff-display);font-weight:500;font-size:var(--t-md);
    letter-spacing:-.2px;color:var(--text);white-space:nowrap}
  .edition{font-family:var(--ff-mono);font-size:12px;color:var(--muted);letter-spacing:.3px;
    border-left:1px solid var(--border);padding-left:var(--s-4);white-space:nowrap}
  .head-actions{display:flex;align-items:center;gap:var(--s-3);flex:none}
  .live{display:inline-flex;align-items:center;gap:var(--s-2);font-family:var(--ff-mono);
    font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--success);text-transform:uppercase}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--success);
    box-shadow:0 0 0 0 color-mix(in srgb,var(--success) 60%, transparent);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--success) 55%,transparent)}
    70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .theme-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
    border-radius:999px;background:transparent;border:1px solid var(--border);
    color:var(--text-soft);cursor:pointer;transition:.18s ease;font-size:14px}
  .theme-btn:hover{border-color:var(--border-strong);background:var(--surface-2)}
  .theme-btn .moon{display:none}
  html[data-theme="dark"] .theme-btn .sun{display:none}
  html[data-theme="dark"] .theme-btn .moon{display:block}
  @media (max-width:640px){.edition{display:none}}

  /* ============ tabs — underlined editorial ============ */
  nav.tabs{position:sticky;top:var(--header-h);z-index:35;
    background:color-mix(in srgb,var(--bg) 88%, transparent);
    backdrop-filter:saturate(140%) blur(8px);-webkit-backdrop-filter:saturate(140%) blur(8px);
    border-bottom:1px solid var(--rule)}
  .tabs-row{display:flex;gap:var(--s-6);overflow-x:auto;
    max-width:var(--maxw);margin:0 auto;padding:0 var(--s-5);scrollbar-width:none}
  .tabs-row::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;display:inline-flex;align-items:center;gap:var(--s-2);
    padding:var(--s-4) 0;background:transparent;border:0;
    border-bottom:1.5px solid transparent;color:var(--muted);
    font-family:var(--ff-display);font-weight:400;font-size:var(--t-sm);
    letter-spacing:.1px;cursor:pointer;white-space:nowrap;
    transition:color .18s, border-color .18s;min-height:44px}
  .tab:hover{color:var(--text)}
  .tab .count{font-family:var(--ff-mono);font-size:11px;font-weight:400;
    color:var(--muted-2);letter-spacing:.3px}
  .tab[aria-selected="true"]{color:var(--text);font-weight:500}
  .tab[aria-selected="true"][data-key="top_stories"]{border-bottom-color:var(--c-top)}
  .tab[aria-selected="true"][data-key="singapore"]{border-bottom-color:var(--c-sg)}
  .tab[aria-selected="true"][data-key="wars"]{border-bottom-color:var(--c-war)}
  .tab[aria-selected="true"][data-key="hantavirus"]{border-bottom-color:var(--c-health)}
  .tab[aria-selected="true"][data-key="cybersecurity"]{border-bottom-color:var(--c-cyber)}

  /* ============ panels ============ */
  section.panel{display:none;padding-top:calc(var(--s-6)*1.5)}
  section.panel.active{display:block;animation:fade .4s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Section head: number + title + tag */
  .section-head{display:grid;grid-template-columns:auto 1fr auto;gap:var(--s-5);
    align-items:end;padding-bottom:var(--s-5);border-bottom:1px solid var(--border);
    margin-bottom:var(--s-6)}
  .section-num{font-family:var(--ff-mono);font-size:13px;color:var(--muted);
    letter-spacing:.5px;padding-bottom:6px;font-weight:700}
  .section-title{font-family:var(--ff-display);font-weight:300;font-size:var(--t-2xl);
    margin:0;letter-spacing:-1.2px;line-height:1.05;color:var(--text)}
  .section-tag{font-family:var(--ff-mono);font-size:11px;text-transform:uppercase;
    letter-spacing:1.4px;padding-bottom:8px;font-weight:700}
  @media (max-width:640px){
    .section-head{grid-template-columns:1fr auto;gap:var(--s-3)}
    .section-num{grid-column:1/-1;padding-bottom:0}
    .section-title{font-size:var(--t-xl);letter-spacing:-.8px}
  }

  /* ============ AI summary — pull-quote style ============ */
  .ai-summary{display:grid;grid-template-columns:auto 1fr;gap:var(--s-5);
    padding:var(--s-5) 0;margin:0 0 var(--s-6);
    align-items:start;max-width:calc(var(--maxw) - 200px)}
  .ai-summary .rail{width:2px;background:var(--accent-color,var(--primary));align-self:stretch;border-radius:2px}
  .ai-summary .ai-label{font-family:var(--ff-mono);font-size:11px;font-weight:700;
    color:var(--accent-color,var(--primary));text-transform:uppercase;
    letter-spacing:1.6px;margin-bottom:var(--s-3);display:inline-flex;align-items:center;gap:var(--s-2)}
  .ai-summary .ai-label::before{content:"✦"}
  .ai-summary .copy{font-family:var(--ff-display);font-weight:300;
    font-size:var(--t-md);line-height:1.62;color:var(--text-soft);letter-spacing:-.1px}

  /* ============ lede article ============ */
  .lede{display:grid;grid-template-columns:1.15fr 1fr;gap:calc(var(--s-6)*1.5);
    padding:var(--s-3) 0 var(--s-6);border-bottom:1px solid var(--border);
    margin-bottom:var(--s-6);align-items:start}
  .lede .cat{display:inline-flex;align-items:center;gap:var(--s-2);
    font-family:var(--ff-mono);font-size:11px;color:var(--accent-color,var(--muted));
    text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:var(--s-3)}
  .lede .cat::before{content:"";width:18px;height:1px;background:var(--accent-color,var(--muted))}
  .lede h3{font-family:var(--ff-display);font-weight:300;
    font-size:clamp(var(--t-xl),3.6vw,var(--t-2xl));margin:0;line-height:1.1;
    letter-spacing:-1.2px;color:var(--text)}
  .lede .sum{font-family:var(--ff-body);font-weight:400;font-size:var(--t-md);
    line-height:1.62;color:var(--text-soft);margin:0 0 var(--s-5);letter-spacing:-.1px}
  .lede .meta{display:flex;justify-content:space-between;align-items:baseline;
    gap:var(--s-4);font-family:var(--ff-mono);font-size:12px;color:var(--muted)}
  .lede .read{font-family:var(--ff-display);font-weight:500;font-size:var(--t-sm);
    color:var(--accent-color,var(--primary));border-bottom:1px solid transparent;transition:border-color .15s}
  .lede .read:hover{border-bottom-color:var(--accent-color,var(--primary))}
  @media (max-width:820px){.lede{grid-template-columns:1fr;gap:var(--s-5)}}

  /* ============ story grid — hairline-top, no card chrome ============ */
  .story-grid{display:grid;grid-template-columns:repeat(3,1fr);
    column-gap:calc(var(--s-6)*1.25);row-gap:var(--s-6)}
  @media (max-width:900px){.story-grid{grid-template-columns:repeat(2,1fr);column-gap:var(--s-6)}}
  @media (max-width:600px){.story-grid{grid-template-columns:1fr}}

  .card{display:flex;flex-direction:column;gap:var(--s-3);min-width:0}
  .card .cat{font-family:var(--ff-mono);font-size:11px;color:var(--accent-color,var(--muted));
    text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
  .card h3{font-family:var(--ff-display);font-weight:500;font-size:var(--t-md);
    margin:0;line-height:1.3;letter-spacing:-.3px;color:var(--text)}
  .card .sum{margin:0;font-size:var(--t-xs);line-height:1.6;color:var(--text-soft)}
  .card .meta{display:flex;justify-content:space-between;align-items:baseline;
    gap:var(--s-3);margin-top:auto;padding-top:var(--s-3);
    font-family:var(--ff-mono);font-size:11px;color:var(--muted)}
  .card .read{font-family:var(--ff-display);font-size:13px;font-weight:500;
    color:var(--accent-color,var(--primary));border-bottom:1px solid transparent;transition:border-color .15s,gap .15s;
    display:inline-flex;align-items:center;gap:4px}
  .card .read:hover{border-bottom-color:var(--accent-color,var(--primary));gap:8px}

  /* ============ wars: theatre + timeline ============ */
  .theatre{padding:var(--s-6) 0;border-top:1px solid var(--border)}
  .theatre:last-child{border-bottom:1px solid var(--border)}
  .theatre-head{display:flex;flex-direction:column;align-items:flex-start;
    gap:var(--s-2);margin-bottom:var(--s-6)}
  .theatre h3{font-family:var(--ff-display);font-weight:300;font-size:var(--t-lg);
    margin:0;letter-spacing:-.6px;color:var(--text)}
  .theatre .status{font-family:var(--ff-mono);font-size:11px;color:var(--c-war);
    text-transform:uppercase;letter-spacing:1.4px;font-weight:700;
    display:inline-flex;align-items:center;gap:var(--s-2)}
  .theatre .status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--c-war)}

  /* Timeline: date column | rail+dot | event column (with reading-measure cap) */
  .timeline{position:relative;display:grid;
    grid-template-columns:128px var(--s-6) minmax(0,62ch);
    column-gap:0;row-gap:var(--s-3)}
  .timeline::before{content:"";position:absolute;left:calc(128px + var(--s-6)/2);
    top:10px;bottom:10px;width:1px;background:var(--border-strong);
    transform:translateX(-.5px)}
  .tl-item{display:contents}
  .tl-item .date{grid-column:1;font-family:var(--ff-mono);font-size:11px;color:var(--muted);
    letter-spacing:.5px;font-weight:700;text-align:right;padding-top:4px;align-self:start}
  .tl-item.today .date{color:var(--c-war)}
  .tl-item .ev{grid-column:3;font-family:var(--ff-body);font-size:var(--t-xs);
    color:var(--text-soft);line-height:1.6;align-self:start;position:relative}
  .tl-item.today .ev{color:var(--text)}
  /* Dot lives on the rail (column 2), aligned to the event row */
  .tl-item .ev::before{content:"";position:absolute;
    left:calc(-1 * var(--s-6) / 2 - 3.5px);top:7px;width:7px;height:7px;border-radius:50%;
    background:var(--bg);border:1.5px solid var(--border-strong);box-sizing:border-box}
  .tl-item.today .ev::before{background:var(--c-war);border-color:var(--c-war);
    box-shadow:0 0 0 4px var(--c-war-soft)}

  @media (max-width:640px){
    .timeline{grid-template-columns:90px var(--s-5) minmax(0,1fr)}
    .timeline::before{left:calc(90px + var(--s-5)/2)}
    .tl-item .ev::before{left:calc(-1 * var(--s-5) / 2 - 3.5px)}
  }

  /* ============ stat row (outbreaks) ============ */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    margin-bottom:var(--s-6)}
  @media (max-width:640px){.stat-row{grid-template-columns:repeat(2,1fr)}}
  .stat{padding:var(--s-5) var(--s-4);border-right:1px solid var(--rule)}
  .stat:last-child{border-right:0}
  @media (max-width:640px){
    .stat:nth-child(2n){border-right:0}
    .stat:nth-child(1),.stat:nth-child(2){border-bottom:1px solid var(--rule)}
  }
  .stat .v{font-family:var(--ff-display);font-weight:300;font-size:var(--t-2xl);
    letter-spacing:-1.2px;line-height:1;color:var(--c-health);font-feature-settings:"tnum","lnum"}
  .stat .l{font-family:var(--ff-mono);font-size:11px;color:var(--muted);
    text-transform:uppercase;letter-spacing:1.2px;margin-top:var(--s-3);font-weight:700}
  .stat-note{font-family:var(--ff-mono);font-size:11.5px;line-height:1.6;color:var(--muted);
    letter-spacing:.2px;margin:calc(-1 * var(--s-5)) 0 var(--s-6);max-width:78ch}

  /* ============ outbreaks: one stat card per outbreak ============ */
  .outbreak{margin-bottom:var(--s-6)}
  .outbreak:last-child{margin-bottom:0}
  .outbreak-head{display:flex;flex-direction:column;align-items:flex-start;
    gap:var(--s-2);margin-bottom:var(--s-3)}
  .outbreak-head h3{font-family:var(--ff-display);font-weight:300;font-size:var(--t-lg);
    margin:0;letter-spacing:-.6px;color:var(--text)}
  .outbreak-head .status{font-family:var(--ff-mono);font-size:11px;color:var(--c-health);
    text-transform:uppercase;letter-spacing:1.2px;font-weight:700;
    display:inline-flex;align-items:center;gap:var(--s-2)}
  .outbreak-head .status::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--c-health)}
  .outbreak .stat-row{margin-bottom:var(--s-3)}
  .outbreak .stat-note{margin:0 0 var(--s-2)}

  /* ============ cyber badges ============ */
  .cyber-badges{display:flex;gap:var(--s-2);flex-wrap:wrap;margin-bottom:var(--s-1)}
  .badge{display:inline-flex;align-items:center;font-family:var(--ff-mono);
    font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:3px;
    letter-spacing:.6px;border:1px solid;text-transform:uppercase}
  .badge.cve,.badge.cvss{background:var(--surface-2);color:var(--text-soft);border-color:var(--border)}
  .sev-CRITICAL{background:var(--sev-crit-bg);color:var(--sev-crit);border-color:var(--sev-crit-bd)}
  .sev-HIGH{background:var(--sev-high-bg);color:var(--sev-high);border-color:var(--sev-high-bd)}
  .sev-MEDIUM{background:var(--sev-med-bg);color:var(--sev-med);border-color:var(--sev-med-bd)}
  .sev-INFORMATIONAL{background:var(--sev-info-bg);color:var(--sev-info);border-color:var(--sev-info-bd)}

  /* published date label + meta layout */
  .card .meta .left,.lede .meta .left{display:inline-flex;align-items:baseline;gap:8px;min-width:0;flex-wrap:wrap}
  .card .meta .when,.lede .meta .when{font-family:var(--ff-mono);font-size:11px;color:var(--accent-color,var(--muted));letter-spacing:.3px;white-space:nowrap}
  .tl-item .ev .tl-src{margin-top:4px;font-family:var(--ff-mono);font-size:10.5px;letter-spacing:.3px;color:var(--muted-2)}
  .tl-item .ev .tl-src a{color:var(--muted);border-bottom:1px solid transparent;transition:border-color .15s}
  .tl-item .ev .tl-src a:hover{border-bottom-color:var(--c-war);color:var(--text-soft)}

  /* ============ footer ============ */
  footer{margin-top:calc(var(--s-6)*2);padding:var(--s-6) 0 var(--s-5);
    border-top:1px solid var(--border);text-align:center;
    color:var(--muted);font-size:13px}
  footer .mono{font-family:var(--ff-mono);font-size:12px;color:var(--text-soft);letter-spacing:.3px}
  footer .disc{margin-top:var(--s-3);font-size:12px;color:var(--muted-2);max-width:540px;
    margin-left:auto;margin-right:auto;line-height:1.55}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important}
    .dot{animation:none}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap masthead">
    <div class="brand">
      <span class="wordmark">The Daily Briefing</span>
      <span class="edition" id="edition">31 May 2026 · Morning · SGT</span>
    </div>
    <div class="head-actions">
      <button class="theme-btn" id="theme-btn" type="button" aria-label="Toggle colour theme" title="Toggle theme">
        <span class="sun" aria-hidden="true">☀</span><span class="moon" aria-hidden="true">☾</span>
      </button>
    </div>
  </div>
</header>

<nav class="tabs" aria-label="Sections">
  <div class="tabs-row" id="tabs-row" role="tablist"></div>
</nav>

<main class="container" id="main"></main>

<footer>
  <div><span class="mono">AI-generated digest</span></div>
  <div class="disc">Not financial or medical advice. Always verify critical information from the linked sources.</div>
</footer>

<script id="news-data" type="application/json">
{
  "meta": {
    "date": "2026-05-31",
    "generated_at": "2026-05-31T09:00:00+08:00",
    "edition": "Daily News Briefing — Morning SGT",
    "sources": [
      "Reuters",
      "Associated Press",
      "Al Jazeera",
      "CBC News",
      "Washington Post",
      "NBC News",
      "CBS News",
      "PBS NewsHour",
      "CNN",
      "NPR",
      "RFE/RL",
      "Times of Israel",
      "Euronews",
      "Ukrainska Pravda",
      "Meduza",

function el(tag, attrs, ...kids){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="class") e.className = attrs[k];

  return e;
}

  let out=parseInt(m[3],10)+" "+months[parseInt(m[2],10)-1]+" "+m[1];
  if(m[4]) out+=", "+m[4]+":"+m[5];
  return out;
}

function severityBadges(s){
  const b = el("div",{class:"cyber-badges"});
  if(s.severity) b.append(el("span",{class:"badge sev-"+s.severity}, s.severity));
  if(s.cve) b.append(el("span",{class:"badge cve"}, s.cve));
  if(s.cvss!=null) b.append(el("span",{class:"badge cvss"}, "CVSS "+s.cvss));
  return b;
}

function ledeArticle(s, key){
  const isCyber = key === "cybersecurity";
  const node = el("article",{class:"lede"+(isCyber?" cyber-lede":"")});
  const left = el("div",{});
  if(isCyber) left.append(severityBadges(s));
  if(s.category) left.append(el("div",{class:"cat"}, s.category));
  left.append(el("h3",{}, s.headline));
  node.append(left);

  const right = el("div",{});
  if(s.summary) right.append(el("p",{class:"sum"}, s.summary));
  const meta = el("div",{class:"meta"});
  const lmeta = el("div",{class:"left"}, el("span",{class:"src"}, s.source||""));
  if(s.published_at) lmeta.append(el("time",{class:"when",datetime:s.published_at}, fmtWhen(s.published_at)));
  meta.append(lmeta);
  if(s.url) meta.append(el("a",{class:"read",href:s.url,target:"_blank",rel:"noopener"}, "Read source →"));
  right.append(meta);
  node.append(right);
  return node;
}

function storyCard(s, key){
  const isCyber = key === "cybersecurity";
  const c = el("article",{class:"card"});
  if(isCyber) c.append(severityBadges(s));
  if(s.category) c.append(el("div",{class:"cat"}, s.category));
  c.append(el("h3",{}, s.headline));
  if(s.summary) c.append(el("p",{class:"sum"}, s.summary));
  const meta = el("div",{class:"meta"});
  const lmeta = el("div",{class:"left"}, el("span",{class:"src"}, s.source||""));
  if(s.published_at) lmeta.append(el("time",{class:"when",datetime:s.published_at}, fmtWhen(s.published_at)));
  meta.append(lmeta);
  if(s.url) meta.append(el("a",{class:"read",href:s.url,target:"_blank",rel:"noopener"}, "Read source →"));
  c.append(meta);
  return c;
}

function renderSection(key, idx){
  const sec = DATA.sections[key];
  const accentVar = ACCENTS[key] || "--primary";
  const panel = el("section",{
    class:"panel",
    "data-section":key,
    role:"tabpanel",
    style:"--accent-color:var("+accentVar+")"
  });

  // Section head
  const num = String(idx+1).padStart(2,"0");
  panel.append(el("div",{class:"section-head"},
    el("div",{class:"section-num"}, num+" /"),
    el("h2",{class:"section-title"}, sec.label),
    el("div",{class:"section-tag",style:"color:var("+accentVar+")"}, TAGS[key]||"")
  ));

  if(sec.ai_summary) panel.append(aiSummary(sec.ai_summary));

  if(key === "wars"){
    for(const t of sec.theatres){
      const card = el("div",{class:"theatre"});
      card.append(el("div",{class:"theatre-head"},
        el("h3",{}, t.name),
        t.status ? el("span",{class:"status"}, t.status) : null
      ));
      const tl = el("div",{class:"timeline"});
      const today = DATA.meta.date;
      for(const ev of t.timeline){
        const isToday = ev.date === today;
        const evNode = el("div",{class:"ev"}, ev.event);
        if(ev.source){
          const src = el("div",{class:"tl-src"});
          if(ev.url) src.append(el("a",{href:ev.url,target:"_blank",rel:"noopener"}, ev.source));
          else src.append(ev.source);
          evNode.append(src);
        }
        tl.append(el("div",{class:"tl-item"+(isToday?" today":"")},
          el("div",{class:"date"}, ev.date),
          evNode
        ));
      }
      card.append(tl);
      panel.append(card);
    }
    return panel;
  }

  if(key === "outbreaks"){
    const dash = v => (v==null || v==="") ? "\u2014" : String(v);
    for(const ob of (sec.outbreaks||[])){
      const card = el("div",{class:"outbreak"});
      card.append(el("div",{class:"outbreak-head"},
        el("h3",{}, ob.name),
        ob.status ? el("span",{class:"status"}, ob.status) : null
      ));
      const sb = el("div",{class:"stat-row"});
      [[dash(ob.cases),"Cases"],
       [dash(ob.deaths),"Deaths"],
       [dash(ob.countries),"Countries"],
       [ob.as_of?fmtWhen(ob.as_of):"\u2014","As of"]]
        .forEach(([v,l])=> sb.append(el("div",{class:"stat"},
          el("div",{class:"v"}, v),
          el("div",{class:"l"}, l)
        )));
      card.append(sb);
      if(ob.scope_note) card.append(el("div",{class:"stat-note"}, ob.scope_note));
      panel.append(card);
    }
  }

  const stories = sec.stories||[];
  if(stories.length){
    // First story becomes the lede if we have enough rhythm
    if(stories.length >= 3){
      panel.append(ledeArticle(stories[0], key));
      const grid = el("div",{class:"story-grid"});
      for(let i=1;i<stories.length;i++) grid.append(storyCard(stories[i], key));
      panel.append(grid);
    } else {
      const grid = el("div",{class:"story-grid"});
      for(const s of stories) grid.append(storyCard(s, key));
      panel.append(grid);
    }
  }
  return panel;
}

function renderTabs(){
  const row = document.getElementById("tabs-row");
  for(const k of KEYS){
    const sec = DATA.sections[k];
    const count = sec.stories ? sec.stories.length : (sec.theatres? sec.theatres.length: 0);
    const t = el("button",{class:"tab","data-key":k,role:"tab","aria-selected":"false","aria-label":sec.label},
      sec.label, el("span",{class:"count"}, String(count).padStart(2,"0")));
    t.addEventListener("click",()=>activate(k));
    row.append(t);
  }
}

function activate(key){
  document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected", t.dataset.key===key?"true":"false"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.dataset.section===key));
  try{ history.replaceState(null,"","#"+key); }catch(e){}
  window.scrollTo({top:0,behavior:"smooth"});
}

/* theme */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute("content", t==="dark" ? "#0B0B0C" : "#fafaf9");
  try{ localStorage.setItem("nb-theme", t); }catch(e){}
}
function initTheme(){
  let t = "light";
  try{ t = localStorage.getItem("nb-theme") || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"); }
  catch(e){ t = matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark":"light"; }
  applyTheme(t);
  document.getElementById("theme-btn").addEventListener("click",()=>{
    applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
  });
}

function init(){
  initTheme();
  const edition = DATA.meta.edition||"";
  const time = edition.includes("Evening")?"Evening":edition.includes("Afternoon")?"Afternoon":edition.includes("Midday")?"Midday":"Morning";
  const d = DATA.meta.date;
  // Render the date elegantly: "27 May 2026"
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  let pretty = d;
  const m = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) pretty = String(parseInt(m[3],10))+" "+months[parseInt(m[2],10)-1]+" "+m[1];
  document.getElementById("edition").textContent = pretty+" · "+time+" · SGT";
  renderTabs();
  const main = document.getElementById("main");
  KEYS.forEach((k,i)=> main.append(renderSection(k, i)));
  const hash = (location.hash||"").replace("#","");
  const start = (hash && DATA.sections[hash]) ? hash : "top_stories";
  document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected", t.dataset.key===start?"true":"false"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.dataset.section===start));
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>

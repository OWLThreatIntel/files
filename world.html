  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2330;
    --surface-3: #232a36;
    --border: #2a3441;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-faint: #6e7681;
    --accent: #58a6ff;
    --war: #ff7b72;
    --sg: #3fb950;
    --health: #76e3ea;
    --cyber: #bc8cff;
    --crit: #f85149;
    --high: #f0883e;
    --med: #d29922;
    --info: #58a6ff;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  a { color: inherit; text-decoration: none; }

  header.top {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,17,23,0.92);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 14px 20px 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .title-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand h1 {
    font-weight: 800; font-size: 22px; letter-spacing: -0.02em;
  }
  .brand h1 span { color: var(--accent); }
  .live {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--sg);
    box-shadow: 0 0 0 0 rgba(63,185,80,0.55);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(63,185,80,0.55);}
    70% { box-shadow: 0 0 0 10px rgba(63,185,80,0);}
    100% { box-shadow: 0 0 0 0 rgba(63,185,80,0);}
  }

  nav.tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
    margin: 0 -4px;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto;
    padding: 10px 14px 12px;
    border: none; background: transparent;
    color: var(--text-dim);
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab[data-section="singapore"].active   { border-bottom-color: var(--sg); }
  .tab[data-section="wars"].active        { border-bottom-color: var(--war); }
  .tab[data-section="hantavirus"].active  { border-bottom-color: var(--health); }
  .tab[data-section="cybersecurity"].active{ border-bottom-color: var(--cyber); }
  .count-pill {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 1px 7px;
    color: var(--text-dim);
  }

  /* Main */
  main {
    max-width: 1200px; margin: 0 auto;
    padding: 28px 20px 60px;
  }
  .section {
    display: none;
    animation: fade 0.35s ease;
  }
  .section.active { display: block; }
  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .section-head h2 {
    font-size: 28px; font-weight: 800; letter-spacing: -0.02em;
  }
  .section-head .meta {
    color: var(--text-faint); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* AI summary callout */
  .ai-summary {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px 18px 24px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .ai-summary::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
  }
  .ai-summary[data-color="sg"]::before    { background: var(--sg); }
  .ai-summary[data-color="war"]::before   { background: var(--war); }
  .ai-summary[data-color="health"]::before{ background: var(--health); }
  .ai-summary[data-color="cyber"]::before { background: var(--cyber); }
  .ai-label {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .ai-label .sparkle { color: var(--accent); }
  .ai-summary[data-color="sg"] .ai-label .sparkle    { color: var(--sg); }
  .ai-summary[data-color="war"] .ai-label .sparkle   { color: var(--war); }
  .ai-summary[data-color="health"] .ai-label .sparkle{ color: var(--health); }
  .ai-summary[data-color="cyber"] .ai-label .sparkle { color: var(--cyber); }
  .ai-summary p {
    font-size: 15.5px; line-height: 1.65; color: var(--text);
  }
  @media (min-width: 720px) {
    .ai-summary p { font-size: 16px; }
  }

  /* Card grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 720px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1000px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .card:hover { border-color: #3a4757; transform: translateY(-2px); }
  .card .category {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent);
  }
  .section[data-section="singapore"] .card .category    { color: var(--sg); }
  .section[data-section="wars"] .card .category         { color: var(--war); }

    font-size: 16.5px; font-weight: 700;
    line-height: 1.35; letter-spacing: -0.01em;
  }
  .card p.summary {
    font-size: 14px; color: var(--text-dim); line-height: 1.55;
    flex-grow: 1;
  }
  .card .meta-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; padding-top: 6px;
    border-top: 1px dashed var(--border);
    font-size: 12px;
    color: var(--text-faint);
  }
  .card .source { font-weight: 600; color: var(--text-dim); }
  .card a.read {
    color: var(--accent);
    font-weight: 600; font-size: 12px;
  }
  .card a.read:hover { text-decoration: underline; }

  /* Cyber-specific */
  .cve-row {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .cve-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    padding: 3px 8px; border-radius: 5px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .severity {
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase;
  }
  .severity.CRITICAL { background: rgba(248,81,73,0.15); color: var(--crit); border: 1px solid rgba(248,81,73,0.35); }
  .severity.HIGH     { background: rgba(240,136,62,0.15); color: var(--high); border: 1px solid rgba(240,136,62,0.35); }
  .severity.MEDIUM   { background: rgba(210,153,34,0.15); color: var(--med);  border: 1px solid rgba(210,153,34,0.35); }
  .severity.INFORMATIONAL { background: rgba(88,166,255,0.12); color: var(--info); border: 1px solid rgba(88,166,255,0.3); }
  .cvss {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; color: var(--text-dim);
    padding: 3px 8px; border-radius: 4px;
    background: var(--surface-2); border: 1px solid var(--border);
  }

  .theatre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;

    font-size: 12px; font-weight: 600;

    background: rgba(255,123,114,0.12);
    color: var(--war);
    border: 1px solid rgba(255,123,114,0.3);

    list-style: none;
    position: relative;
    padding-left: 22px;
    margin-top: 8px;

  ol.timeline::before {
    content: ''; position: absolute;
    left: 6px; top: 8px; bottom: 8px;
    width: 2px; background: var(--border);
  }
  ol.timeline li {
    position: relative;
    padding: 6px 0 10px;
  }
  ol.timeline li::before {
    content: ''; position: absolute;
    left: -22px; top: 11px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--surface-3);
    border: 2px solid var(--border);

  ol.timeline li.today::before {
    background: var(--war); border-color: var(--war);
    box-shadow: 0 0 0 4px rgba(255,123,114,0.15);
  }
  ol.timeline .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-faint);
    margin-bottom: 2px;
  }
  ol.timeline li.today .date { color: var(--war); font-weight: 600; }
  ol.timeline .event {
    font-size: 14.5px; color: var(--text);

  /* Hantavirus stat bar */
  .stat-bar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  @media (min-width: 720px) {
    .stat-bar { grid-template-columns: repeat(4, 1fr); }
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 12px;
    text-align: left;
  }
  .stat .label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .stat .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 600;
    color: var(--health);
    letter-spacing: -0.01em;
  }
  .stat .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    margin-top: 36px;
    padding: 22px 20px 28px;
    text-align: center;
    color: var(--text-faint);
    font-size: 12.5px;
  }
  footer .disclaimer { max-width: 720px; margin: 0 auto 8px; line-height: 1.55; }
  footer .gen { font-family: 'JetBrains Mono', monospace; }

  @media (max-width: 540px) {
    .section-head h2 { font-size: 23px; }
    .brand h1 { font-size: 18px; }
    main { padding: 22px 14px 50px; }
    .header-inner { padding: 12px 14px 0; }
  }
</style>
</head>

// ---------- Helpers ----------
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
function safeUrl(url) {
  if (!url) return '#';
  try {
    const u = new URL(url, window.location.href);
    if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
  } catch (e) {}
  return '#';
}
function formatHeaderDate(iso) {
  const d = new Date(iso);
  const opts = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
  return d.toLocaleDateString('en-SG', opts);
}
function colorAttr(key) {
  return { top_stories:'accent', singapore:'sg', wars:'war', hantavirus:'health', cybersecurity:'cyber' }[key] || 'accent';
}
const TODAY_ISO = DATA.meta.date; // "2026-05-16"

// ---------- Renderers ----------
function renderAiSummary(text, color) {
  return `
    <div class="ai-summary" data-color="${escapeHtml(color)}">
      <div class="ai-label"><span class="sparkle">✦</span> AI Summary</div>
      <p>${escapeHtml(text)}</p>
    </div>`;
}
function renderCard(story) {
  return `
    <article class="card">
      <div class="category">${escapeHtml(story.category || '')}</div>
      <h3>${escapeHtml(story.headline || '')}</h3>
      <p class="summary">${escapeHtml(story.summary || '')}</p>
      <div class="meta-row">
        <span class="source">${escapeHtml(story.source || '')}</span>
        <a class="read" href="${safeUrl(story.url)}" target="_blank" rel="noopener noreferrer">Read →</a>
      </div>
    </article>`;
}
function renderCyberCard(story) {
  const cveHtml = story.cve
    ? `<span class="cve-pill">${escapeHtml(story.cve)}</span>`
    : '';
  const cvssHtml = (story.cvss != null)
    ? `<span class="cvss">CVSS ${escapeHtml(String(story.cvss))}</span>`
    : '';
  const sevHtml = story.severity
    ? `<span class="severity ${escapeHtml(story.severity)}">${escapeHtml(story.severity)}</span>`
    : '';
  return `
    <article class="card">
      <div class="category">${escapeHtml(story.category || '')}</div>
      <h3>${escapeHtml(story.headline || '')}</h3>
      <div class="cve-row">${sevHtml}${cveHtml}${cvssHtml}</div>
      <p class="summary">${escapeHtml(story.summary || '')}</p>
      <div class="meta-row">
        <span class="source">${escapeHtml(story.source || '')}</span>
        <a class="read" href="${safeUrl(story.url)}" target="_blank" rel="noopener noreferrer">Read →</a>
      </div>
    </article>`;
}
function renderTheatre(t) {
  const items = (t.timeline || []).map(ev => {
    const isToday = ev.date === TODAY_ISO;
    return `<li class="${isToday ? 'today' : ''}">
      <div class="date">${escapeHtml(ev.date)}${isToday ? ' • today' : ''}</div>
      <div class="event">${escapeHtml(ev.event)}</div>
    </li>`;
  }).join('');
  return `
    <div class="theatre">
      <div class="theatre-head">
        <h3>${escapeHtml(t.name)}</h3>
        <span class="theatre-status">${escapeHtml(t.status || '')}</span>
      </div>
      <ol class="timeline">${items}</ol>
    </div>`;
}
function renderStatBar(stats) {
  if (!stats) return '';
  return `
    <div class="stat-bar">
      <div class="stat"><div class="label">Total cases</div><div class="value">${stats.total_cases ?? '—'}</div><div class="sub">As of ${escapeHtml(stats.as_of || '')}</div></div>
      <div class="stat"><div class="label">Confirmed</div><div class="value">${stats.confirmed_cases ?? '—'}</div><div class="sub">Lab confirmed</div></div>
      <div class="stat"><div class="label">Deaths</div><div class="value">${stats.total_deaths ?? '—'}</div><div class="sub">2 confirmed Andes</div></div>
      <div class="stat"><div class="label">Countries</div><div class="value">${stats.countries_affected ?? '—'}</div><div class="sub">Passenger repatriation</div></div>
    </div>`;
}

// ---------- Section builders ----------
function buildSection(key, data) {
  const el = document.getElementById('sec-' + key);
  if (!el) return;
  const color = data.color || colorAttr(key);
  let html = '';
  let count = 0;

  // Section heading
  html += `<div class="section-head">
    <h2>${escapeHtml(data.label)}</h2>
    <div class="meta">${escapeHtml(DATA.meta.edition)} · ${escapeHtml(DATA.meta.date)}</div>
  </div>`;

  // AI summary callout
  if (data.ai_summary) {
    html += renderAiSummary(data.ai_summary, color);
  }

  // Section-specific body
  if (key === 'wars') {
    html += (data.theatres || []).map(renderTheatre).join('');
    count = (data.theatres || []).length;
  } else if (key === 'hantavirus') {
    html += renderStatBar(data.stats);
    html += '<div class="grid">' + (data.stories || []).map(renderCard).join('') + '</div>';
    count = (data.stories || []).length;
  } else if (key === 'cybersecurity') {
    html += '<div class="grid">' + (data.stories || []).map(renderCyberCard).join('') + '</div>';
    count = (data.stories || []).length;
  } else {
    html += '<div class="grid">' + (data.stories || []).map(renderCard).join('') + '</div>';
    count = (data.stories || []).length;
  }

  el.innerHTML = html;
  const pill = document.getElementById('count-' + key);
  if (pill) pill.textContent = count;
}

// ---------- Init ----------
function init() {
  // Header date
  document.getElementById('header-date').textContent = formatHeaderDate(DATA.meta.generated_at);
  document.getElementById('footer-gen').textContent =
    'Generated by Claude · ' + DATA.meta.generated_at;

  // Build all sections
  Object.entries(DATA.sections).forEach(([key, data]) => buildSection(key, data));

  // Tabs
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => {
    t.addEventListener('click', () => {
      const key = t.dataset.section;
      tabs.forEach(x => {
        const active = x.dataset.section === key;
        x.classList.toggle('active', active);
        x.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      document.querySelectorAll('.section').forEach(s => {
        s.classList.toggle('active', s.dataset.section === key);
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>

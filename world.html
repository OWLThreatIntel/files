const SECTION_ORDER = [
  {key: "top_stories", icon: "★"},
  {key: "singapore", icon: "◆"},
  {key: "wars", icon: "⚔"},
  {key: "hantavirus", icon: "⚕"},
  {key: "cybersecurity", icon: "⌬"}
];

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});
}

function escapeHtml(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  SECTION_ORDER.forEach((sec, idx) => {
    const data = DATA.sections[sec.key];
    if (!data) return;
    const count =
      data.stories ? data.stories.length :
      data.theatres ? data.theatres.length : 0;
    const btn = document.createElement('button');
    btn.className = 'tab' + (idx === 0 ? ' active' : '');
    btn.dataset.key = sec.key;
    btn.setAttribute('aria-label', data.label);
    btn.innerHTML = `<span>${sec.icon}</span><span>${escapeHtml(data.label)}</span><span class="count">${count}</span>`;
    btn.addEventListener('click', () => switchTab(sec.key));
    tabs.appendChild(btn);
  });
}

function switchTab(key){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.dataset.key === key));
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function storyCard(s, sectionKey){
  const isCyber = sectionKey === 'cybersecurity';
  const cveRow = isCyber ? `
    <div class="cve-row">
      ${s.cve ? `<span class="cve-pill">${escapeHtml(s.cve)}</span>` : ''}
      ${s.cvss !== null && s.cvss !== undefined ? `<span class="cvss-pill">CVSS ${escapeHtml(s.cvss.toFixed(1))}</span>` : ''}
      ${s.severity ? `<span class="sev-badge sev-${escapeHtml(s.severity)}">${escapeHtml(s.severity)}</span>` : ''}
    </div>
  ` : '';
  return `
    <article class="card">
      <span class="cat">${escapeHtml(s.category)}</span>
      <h3>${escapeHtml(s.headline)}</h3>
      ${cveRow}
      <p>${escapeHtml(s.summary)}</p>
      <div class="card-foot">
        <span>${escapeHtml(s.source)}</span>
        <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener noreferrer">Read →</a>
      </div>
    </article>
  `;
}

function renderStorySection(key, data){
  const grid = data.stories.map(s => storyCard(s, key)).join('');
  return `
    <section class="section ${key==='top_stories'?'active':''}" data-key="${key}">
      <div class="section-head">
        <h2>${escapeHtml(data.label)}</h2>
        <span class="desc">${data.stories.length} stories</span>
      </div>
      <div class="grid">${grid}</div>
    </section>
  `;
}

function renderWars(data){
  const today = DATA.meta.date;
  const theatres = data.theatres.map(t => {
    const items = t.timeline.map(tl => {
      const isToday = tl.date === today;
      return `
        <div class="tl-item${isToday?' today':''}">
          <span class="tl-date">${escapeHtml(tl.date)}</span>
          <div class="tl-event">${escapeHtml(tl.event)}</div>
        </div>
      `;
    }).join('');
    return `
      <div class="theatre">
        <div class="theatre-head">
          <h3>${escapeHtml(t.name)}</h3>
          <span class="theatre-status">${escapeHtml(t.status)}</span>
        </div>
        <div class="timeline">${items}</div>
      </div>
    `;
  }).join('');
  return `
    <section class="section" data-key="wars">
      <div class="section-head">
        <h2>${escapeHtml(data.label)}</h2>
        <span class="desc">${data.theatres.length} active theatres · today's entries highlighted</span>
      </div>
      ${theatres}
    </section>
  `;
}

function renderHanta(data){
  const s = data.stats;
  const statRow = `
    <div class="stat-row">
      <div class="stat"><div class="stat-label">Total cases</div><div class="stat-value">${s.total_cases}</div></div>
      <div class="stat"><div class="stat-label">Confirmed</div><div class="stat-value">${s.confirmed_cases}</div></div>
      <div class="stat deaths"><div class="stat-label">Deaths</div><div class="stat-value">${s.deaths}</div></div>
      <div class="stat"><div class="stat-label">Case fatality</div><div class="stat-value">${escapeHtml(s.case_fatality_ratio)}</div></div>
      <div class="stat"><div class="stat-label">Countries</div><div class="stat-value">${s.countries_affected}</div></div>
      <div class="stat risk"><div class="stat-label">Global risk</div><div class="stat-value">${escapeHtml(s.global_risk)}</div></div>
    </div>
  `;
  const grid = data.stories.map(st => storyCard(st, 'hantavirus')).join('');
  return `
    <section class="section" data-key="hantavirus">
      <div class="section-head">
        <h2>${escapeHtml(data.label)} Outbreak</h2>
        <span class="desc">MV Hondius · WHO DON601 · as of 13 May 2026</span>
      </div>
      ${statRow}
      <div class="grid">${grid}</div>
    </section>
  `;
}

function renderMain(){
  const main = document.getElementById('main');
  let html = '';
  SECTION_ORDER.forEach(sec => {
    const data = DATA.sections[sec.key];
    if (!data) return;
    if (sec.key === 'wars') html += renderWars(data);
    else if (sec.key === 'hantavirus') html += renderHanta(data);
    else html += renderStorySection(sec.key, data);
  });
  main.innerHTML = html;
}

function init(){
  document.getElementById('dateLine').textContent = fmtDate(DATA.meta.generated_at) + ' · ' + DATA.meta.edition;
  document.title = `SG Morning Brief — ${DATA.meta.date}`;
  renderTabs();
  renderMain();
}

init();
</script>
</body>
</html>

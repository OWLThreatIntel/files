// ---- Render ----
const SPARKLE_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l1.6 4.6L18 8l-4.4 1.4L12 14l-1.6-4.6L6 8l4.4-1.4z"/><path d="M19 14l.9 2.5L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.5z"/></svg>';

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function aiSummary(text){
  return `<div class="ai-summary"><div class="ai-tag">${SPARKLE_SVG}<span>AI Summary</span></div><p>${escapeHtml(text)}</p></div>`;
}

function storyCard(s, isCyber){
  const cveRow = isCyber ? `<div class="cve-row">
    ${s.cve ? `<span class="cve-pill">${escapeHtml(s.cve)}</span>` : ''}
    ${s.cvss ? `<span class="cvss-pill">CVSS ${s.cvss}</span>` : ''}
    ${s.severity ? `<span class="sev ${escapeHtml(s.severity)}">${escapeHtml(s.severity)}</span>` : ''}
  </div>` : '';
  return `<article class="card">
    <span class="cat">${escapeHtml(s.category || '')}</span>
    <h3>${escapeHtml(s.headline)}</h3>
    ${cveRow}
    <p>${escapeHtml(s.summary)}</p>
    <div class="foot">
      <span class="src">${escapeHtml(s.source)}</span>
      <a class="read" href="${escapeHtml(s.url)}" target="_blank" rel="noopener">Read →</a>
    </div>
  </article>`;
}

function statBar(stats){
  return `<div class="stat-bar">${Object.entries(stats).map(([k,v])=>`<div class="stat"><div class="val">${escapeHtml(v)}</div><div class="lbl">${escapeHtml(k)}</div></div>`).join('')}</div>`;
}

function theatre(t, todayDate){
  return `<div class="theatre">
    <h3>${escapeHtml(t.name)}</h3>
    <p class="status">${escapeHtml(t.status)}</p>
    <div class="timeline">
      ${t.timeline.map(e=>`<div class="tl-item ${e.date===todayDate?'today':''}"><span class="date">${escapeHtml(e.date)}</span><span class="event">${escapeHtml(e.event)}</span></div>`).join('')}
    </div>
  </div>`;
}

function render(){
  document.getElementById('meta-line').textContent = `${DATA.meta.edition} · ${DATA.meta.cycle} · ${DATA.meta.date} 21:00 SGT`;

  const tabsEl = document.getElementById('tabs');
  const mainEl = document.getElementById('main');
  const keys = Object.keys(DATA.sections);
  const todayDate = DATA.meta.date;

  keys.forEach((k, idx) => {
    const sec = DATA.sections[k];
    const count = sec.stories ? sec.stories.length : (sec.theatres ? sec.theatres.length : 0);
    const tab = document.createElement('button');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.dataset.target = k;
    tab.innerHTML = `${escapeHtml(sec.label)} <span class="count">${count}</span>`;
    tab.addEventListener('click', () => switchTo(k));
    tabsEl.appendChild(tab);

    const section = document.createElement('section');
    section.id = 'sec-' + k;
    section.className = idx === 0 ? 'active' : '';

    let body = `<div class="section-head"><h2>${escapeHtml(sec.label)}</h2><span class="badge">${count} item${count===1?'':'s'}</span></div>`;
    body += aiSummary(sec.ai_summary);

    if (k === 'wars') {
      body += sec.theatres.map(t => theatre(t, todayDate)).join('');
    } else {
      if (sec.stats) body += statBar(sec.stats);
      body += '<div class="grid">' + sec.stories.map(s => storyCard(s, k==='cybersecurity')).join('') + '</div>';
    }

    section.innerHTML = body;
    mainEl.appendChild(section);
  });
}

function switchTo(key){
  document.querySelectorAll('nav .tab').forEach(t => t.classList.toggle('active', t.dataset.target === key));
  document.querySelectorAll('main section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + key));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>

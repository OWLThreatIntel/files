// --- Render
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstElementChild; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function severityBadge(sev){ if(!sev) return ''; const k = sev.toLowerCase(); return `<span class="pill badge-${k}">${escapeHtml(sev)}</span>`; }

function renderCard(item, cls){
  const cveHtml = item.cve ? `<span class="pill cve-pill">${escapeHtml(item.cve)}</span>` : '';
  const cvssHtml = (item.cvss !== undefined && item.cvss !== null) ? `<span class="pill cvss-pill">CVSS ${item.cvss}</span>` : '';
  const sevHtml = item.severity ? severityBadge(item.severity) : '';
  return `
    <a class="card ${cls}" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">
      <div class="cat">${escapeHtml(item.category || '')}</div>
      <h3>${escapeHtml(item.headline)}</h3>
      <p>${escapeHtml(item.summary)}</p>
      <div class="meta">
        ${cveHtml}${cvssHtml}${sevHtml}
        <span class="source">${escapeHtml(item.source || '')}</span>
        <span class="read-more">Read →</span>
      </div>
    </a>`;
}

function setSummary(target, sec){
  const el = document.getElementById(target);
  el.innerHTML = `<div class="accent-bar"></div><div class="body"><div class="label">AI Summary</div><div class="text">${escapeHtml(sec.ai_summary || '')}</div></div>`;
}

function fillGrid(target, items, cls){
  document.getElementById(target).innerHTML = items.map(i => renderCard(i, cls)).join('');
}

const d = new Date(DATA.meta.generated_at);

document.getElementById('dateLine').textContent = `${DATA.meta.cycle} · ${fmt} SGT`;

// Tab switching
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav.tabs button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

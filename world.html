<title>Daily News Briefing — 18 May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#0d1117; --surface:#161b22; --surface2:#1c232d;
    --line:#222a35; --text:#e6edf3; --muted:#8b96a7;
    --accent:#58a6ff; --war:#ff7b72; --sg:#3fb950;
    --health:#76e3ea; --cyber:#bc8cff;
    --critical:#ff4d4f; --high:#ff9f43; --medium:#fac858; --info:#58a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* HEADER */
  header.site{
    position:sticky;top:0;z-index:50;
    background:rgba(13,17,23,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .hdr-inner{
    max-width:1200px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand h1{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .brand h1 span{color:var(--accent)}
  .meta-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .live-dot{width:8px;height:8px;background:var(--sg);border-radius:50%;box-shadow:0 0 0 0 var(--sg);animation:pulse 2s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,185,80,.6)}
    70%{box-shadow:0 0 0 10px rgba(63,185,80,0)}
    100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}
  }

  /* NAV TABS */
  nav.tabs{
    position:sticky;top:57px;z-index:40;background:var(--bg);
    border-bottom:1px solid var(--line);
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  nav.tabs ul{
    list-style:none;display:flex;gap:4px;padding:10px 18px;max-width:1200px;margin:0 auto;
    min-width:max-content;
  }
  nav.tabs button{
    background:transparent;color:var(--muted);border:1px solid transparent;
    padding:8px 14px;border-radius:8px;font:600 13px 'Inter',sans-serif;
    cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:.15s;
  }
  nav.tabs button:hover{color:var(--text);background:var(--surface)}
  nav.tabs button.active{color:var(--text);background:var(--surface);border-color:var(--line)}
  nav.tabs button .count{
    background:var(--surface2);color:var(--muted);font-size:11px;
    padding:2px 7px;border-radius:99px;font-family:'JetBrains Mono',monospace;
  }
  nav.tabs button.active .count{background:var(--accent);color:#0d1117}

  /* MAIN */
  main{max-width:1200px;margin:0 auto;padding:24px 18px 60px}
  section.tab-section{display:none;animation:fadein .35s ease}
  section.tab-section.active{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    margin-bottom:14px;flex-wrap:wrap;
  }
  .section-head h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .section-head .sub{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}

  /* AI SUMMARY CALLOUT */
  .ai-summary{
    position:relative;border-radius:12px;background:var(--surface);
    padding:16px 18px 16px 22px;margin-bottom:20px;
    border:1px solid var(--line);overflow:hidden;
  }
  .ai-summary::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);
  }
  .ai-summary.top_stories::before{background:var(--accent)}
  .ai-summary.singapore::before{background:var(--sg)}
  .ai-summary.wars::before{background:var(--war)}
  .ai-summary.hantavirus::before{background:var(--health)}
  .ai-summary.cybersecurity::before{background:var(--cyber)}
  .ai-summary .label{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;
    color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;
  }
  .ai-summary .label::before{content:"✦";color:var(--accent);font-size:13px}
  .ai-summary.singapore .label::before{color:var(--sg)}
  .ai-summary.wars .label::before{color:var(--war)}
  .ai-summary.hantavirus .label::before{color:var(--health)}
  .ai-summary.cybersecurity .label::before{color:var(--cyber)}
  .ai-summary p{font-size:15.5px;line-height:1.6;color:var(--text)}

  /* CARD GRID */
  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
  @media (max-width:960px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media (max-width:640px){.grid{grid-template-columns:1fr}}

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:16px;display:flex;flex-direction:column;gap:10px;transition:.15s;
  }
  .card:hover{border-color:#2f3a4a;transform:translateY(-1px)}
  .card .cat{
    font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:700;font-family:'JetBrains Mono',monospace;
  }
  .card h3{font-size:15px;font-weight:700;line-height:1.35}
  .card p{font-size:13.5px;color:var(--muted);line-height:1.55}
  .card .meta{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    margin-top:auto;padding-top:8px;border-top:1px dashed var(--line);
  }
  .card .meta a.src{color:var(--accent)}

  /* CVE / SEVERITY */
  .cve-row{display:flex;flex-wrap:wrap;gap:6px;margin:-2px 0 4px}
  .pill{
    display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:3px 8px;border-radius:99px;font-family:'JetBrains Mono',monospace;
    border:1px solid var(--line);background:var(--surface2);color:var(--text);
  }
  .pill.crit{background:rgba(255,77,79,.14);color:var(--critical);border-color:rgba(255,77,79,.35)}
  .pill.high{background:rgba(255,159,67,.14);color:var(--high);border-color:rgba(255,159,67,.35)}
  .pill.med{background:rgba(250,200,88,.14);color:var(--medium);border-color:rgba(250,200,88,.35)}
  .pill.info{background:rgba(88,166,255,.14);color:var(--info);border-color:rgba(88,166,255,.35)}

  /* HANTAVIRUS STATS */
  .stats-bar{
    display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px;
  }
  @media (max-width:640px){.stats-bar{grid-template-columns:repeat(2,1fr)}}
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:14px;text-align:center;
  }
  .stat .v{font-size:28px;font-weight:800;color:var(--health);font-family:'JetBrains Mono',monospace}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px}

  /* WAR TIMELINES */
  .theatre{margin-bottom:24px}
  .theatre h3{font-size:18px;font-weight:700;margin-bottom:4px;color:var(--war)}
  .theatre .status{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:'JetBrains Mono',monospace}
  .timeline{position:relative;padding-left:22px;border-left:2px solid var(--line)}
  .tl-item{position:relative;padding:8px 0 12px}
  .tl-item::before{
    content:"";position:absolute;left:-29px;top:14px;width:10px;height:10px;
    background:var(--surface);border:2px solid var(--war);border-radius:50%;
  }
  .tl-item.today::before{background:var(--war);box-shadow:0 0 0 4px rgba(255,123,114,.25)}
  .tl-item .d{font-size:11.5px;color:var(--war);font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
  .tl-item.today .d::after{content:" · TODAY";color:var(--text)}
  .tl-item .e{font-size:13.5px;color:var(--text);margin-top:2px;line-height:1.5}

  /* FOOTER */
  footer{
    max-width:1200px;margin:30px auto 0;padding:18px;border-top:1px solid var(--line);
    text-align:center;font-size:12px;color:var(--muted);
  }
</style>
</head>

const TODAY = DATA.meta.date;
const SECTION_ORDER = ["top_stories","singapore","wars","hantavirus","cybersecurity"];

function fmtDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString('en-SG',{weekday:'short',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Singapore'}) + ' SGT';
  }catch(e){return iso}
}

document.getElementById('meta-text').textContent =
  fmtDate(DATA.meta.generated_at) + ' · ' + (DATA.meta.cycle || 'Daily edition');

const sevClass = s => s==='CRITICAL'?'crit':s==='HIGH'?'high':s==='MEDIUM'?'med':'info';

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function countItems(key){
  const s = DATA.sections[key];
  if(key==='wars') return s.theatres.length;
  return s.stories.length;
}

function renderTabs(){
  const ul = document.getElementById('tab-list');
  ul.innerHTML = SECTION_ORDER.map(k=>{
    const s = DATA.sections[k];
    return `<li><button data-tab="${k}" aria-label="Show ${s.label}">${s.label}<span class="count">${countItems(k)}</span></button></li>`;
  }).join('');
  ul.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>activateTab(btn.dataset.tab));
  });
}

function aiSummary(key){
  const s = DATA.sections[key];
  return `<div class="ai-summary ${key}">
    <div class="label">AI Summary</div>
    <p>${escapeHtml(s.ai_summary)}</p>
  </div>`;
}

function renderStoryCard(st, opts={}){
  const cveRow = (st.cve || st.cvss || st.severity) ? `
    <div class="cve-row">
      ${st.cve?`<span class="pill">${escapeHtml(st.cve)}</span>`:''}
      ${st.cvss?`<span class="pill">CVSS ${st.cvss}</span>`:''}
      ${st.severity?`<span class="pill ${sevClass(st.severity)}">${escapeHtml(st.severity)}</span>`:''}
    </div>` : '';
  return `<article class="card">
    <div class="cat">${escapeHtml(st.category||'')}</div>
    ${cveRow}
    <h3>${escapeHtml(st.headline)}</h3>
    <p>${escapeHtml(st.summary)}</p>
    <div class="meta">
      <span>${escapeHtml(st.source||'')}</span>
      <a class="src" href="${escapeHtml(st.url||'#')}" target="_blank" rel="noopener">Source ↗</a>
    </div>
  </article>`;
}

function renderSection(key){
  const s = DATA.sections[key];
  if(key === 'wars'){
    return `
      <div class="section-head"><h2>${escapeHtml(s.label)}</h2><span class="sub">${s.theatres.length} active theatres</span></div>
      ${aiSummary(key)}
      ${s.theatres.map(t=>`
        <div class="theatre">
          <h3>${escapeHtml(t.name)}</h3>
          <div class="status">${escapeHtml(t.status)}</div>
          <div class="timeline">
            ${t.timeline.map(item=>{
              const today = item.date === TODAY;
              return `<div class="tl-item${today?' today':''}">
                <div class="d">${escapeHtml(item.date)}</div>
                <div class="e">${escapeHtml(item.event)}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}`;
  }
  if(key === 'hantavirus'){
    const st = s.stats || {};
    return `
      <div class="section-head"><h2>${escapeHtml(s.label)}</h2><span class="sub">${s.stories.length} updates</span></div>
      ${aiSummary(key)}
      <div class="stats-bar">
        <div class="stat"><div class="v">${st.confirmed_cases ?? '–'}</div><div class="l">Confirmed cases</div></div>
        <div class="stat"><div class="v">${st.suspected_cases ?? '–'}</div><div class="l">Suspected</div></div>
        <div class="stat"><div class="v">${st.deaths ?? '–'}</div><div class="l">Deaths</div></div>
        <div class="stat"><div class="v">${st.countries_affected ?? '–'}</div><div class="l">Countries affected</div></div>
      </div>
      <div class="grid">${s.stories.map(renderStoryCard).join('')}</div>`;
  }
  return `
    <div class="section-head"><h2>${escapeHtml(s.label)}</h2><span class="sub">${s.stories.length} stories</span></div>
    ${aiSummary(key)}
    <div class="grid">${s.stories.map(renderStoryCard).join('')}</div>`;
}

function renderAll(){
  const main = document.getElementById('main');
  main.innerHTML = SECTION_ORDER.map(k=>`<section class="tab-section" data-section="${k}">${renderSection(k)}</section>`).join('');
}

function activateTab(key){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===key));
  document.querySelectorAll('section.tab-section').forEach(s=>s.classList.toggle('active', s.dataset.section===key));
  try{ history.replaceState(null,'','#'+key); }catch(e){}
}

renderTabs();
renderAll();
const initial = (location.hash || '#top_stories').replace('#','');
activateTab(SECTION_ORDER.includes(initial)?initial:'top_stories');
</script>
</body>
</html>

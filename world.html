    --surface:#161b22;
    --surface-2:#1f2630;
    --border:#2a313c;
    --text:#e6edf3;
    --muted:#9aa6b2;
    --accent:#58a6ff;
    --war:#ff7b72;
    --sg:#3fb950;
    --health:#76e3ea;
    --cyber:#bc8cff;
    --crit:#f85149;
    --high:#ff8c42;
    --med:#d29922;
    --info:#58a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Header */
  header.site{
    background:linear-gradient(180deg,#0d1117 0%,#0d1117f0 60%, #0d1117c0 100%);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
  }
  .header-inner{
    max-width:1280px;margin:0 auto;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .logo-dot{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--cyber));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#0d1117;font-size:15px;flex-shrink:0}
  .brand-text{display:flex;flex-direction:column;min-width:0}
  .brand-title{font-weight:700;font-size:15px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand-sub{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:11px;letter-spacing:.4px}
  .live{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--sg);box-shadow:0 0 0 0 rgba(63,185,80,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,185,80,.7)}70%{box-shadow:0 0 0 8px rgba(63,185,80,0)}100%{box-shadow:0 0 0 0 rgba(63,185,80,0)}}

  /* Tabs */
  nav.tabs{
    background:var(--bg);
    border-bottom:1px solid var(--border);
    position:sticky;top:62px;z-index:49;
  }
  .tabs-inner{
    max-width:1280px;margin:0 auto;padding:10px 12px;
    display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
  }
  .tabs-inner::-webkit-scrollbar{display:none}
  .tab{
    background:transparent;border:1px solid transparent;color:var(--muted);
    padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;
    white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:8px;
    font-family:inherit;transition:all .15s ease;
  }
  .tab:hover{color:var(--text);background:var(--surface)}
  .tab.active{background:var(--surface);color:var(--text);border-color:var(--border)}
  .tab .count{
    font-family:'JetBrains Mono',monospace;font-size:11px;
    background:var(--surface-2);padding:2px 7px;border-radius:99px;color:var(--muted);
  }
  .tab.active .count{background:var(--accent);color:#0d1117}

  /* Main */
  main{max-width:1280px;margin:0 auto;padding:24px 18px 80px}
  section.panel{display:none;animation:fadein .3s ease}
  section.panel.active{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
  .section-head h1{font-size:24px;font-weight:800;letter-spacing:-.4px}
  .section-head .meta{color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace}

  /* AI Summary Callout */
  .ai-summary{
    background:linear-gradient(180deg,var(--surface) 0%,var(--surface-2) 100%);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:22px;
    position:relative;
  }

  .ai-summary[data-section="singapore"]{border-left-color:var(--sg)}
  .ai-summary[data-section="wars"]{border-left-color:var(--war)}
  .ai-summary[data-section="hantavirus"]{border-left-color:var(--health)}
  .ai-summary[data-section="cybersecurity"]{border-left-color:var(--cyber)}

    text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;font-weight:600;

  .ai-summary[data-section="singapore"] .label::before{color:var(--sg)}
  .ai-summary[data-section="wars"] .label::before{color:var(--war)}
  .ai-summary[data-section="hantavirus"] .label::before{color:var(--health)}
  .ai-summary[data-section="cybersecurity"] .label::before{color:var(--cyber)}
  .ai-summary p{font-size:15.5px;line-height:1.65;color:var(--text)}

  .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
  @media (max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media (max-width:600px){.grid{grid-template-columns:1fr}}

    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 16px 14px;
    display:flex;flex-direction:column;gap:10px;

    text-transform:uppercase;color:var(--muted);font-weight:600;

  .card p.summary{font-size:14px;color:#c9d3df;line-height:1.55}
  .card .meta-row{

    gap:10px;margin-top:auto;font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;

  .card .meta-row a{font-weight:600}

  .cve-pill{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;

    border:1px solid var(--border);
  }
  .cvss{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    padding:3px 8px;border-radius:6px;background:#2a313c;color:var(--text);
  }
  .badge{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:800;
    padding:3px 8px;border-radius:6px;letter-spacing:.6px;text-transform:uppercase;

  .badge.CRITICAL{background:var(--crit);color:#fff}
  .badge.HIGH{background:var(--high);color:#fff}
  .badge.MEDIUM{background:var(--med);color:#1a1a1a}

  .theatre-status{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}

  .timeline-item{position:relative;padding:0 0 12px 16px}
  .timeline-item:last-child{padding-bottom:0}

  }
  .timeline-item.today .date{color:var(--war)}
  .timeline-item .event{font-size:14px;color:var(--text);margin-top:2px}

  .stat-bar{

  .stat-card{

  .stat-card .num{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--text)}
  .stat-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace}

    color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:99px;
    border:1px solid var(--border);margin-bottom:8px;
  }

// ---- Render ----
function esc(s){return (s??'').toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function fmtGen(iso){
  try{
    const d=new Date(iso);
    const opts={weekday:'short',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Asia/Singapore'};
    return d.toLocaleString('en-SG',opts)+' SGT';
  }catch(e){return iso}
}

document.getElementById('genStamp').textContent = fmtGen(DATA.meta.generated_at);

const sectionKeys = ['top_stories','singapore','wars','hantavirus','cybersecurity'];
const tabsEl = document.getElementById('tabs');
const mainEl = document.getElementById('main');

function countFor(key){
  const s = DATA.sections[key];
  if(s.theatres) return s.theatres.length;
  return (s.stories||[]).length;
}

sectionKeys.forEach((key,i)=>{
  const s = DATA.sections[key];
  const tab = document.createElement('button');
  tab.className='tab'+(i===0?' active':'');
  tab.dataset.key=key;
  tab.setAttribute('role','tab');
  tab.innerHTML = `${esc(s.label)} <span class="count">${countFor(key)}</span>`;
  tab.addEventListener('click',()=>activate(key));
  tabsEl.appendChild(tab);

  const panel = document.createElement('section');
  panel.className='panel'+(i===0?' active':'');
  panel.id='panel-'+key;
  panel.innerHTML = renderPanel(key,s);
  mainEl.appendChild(panel);
});

function activate(key){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+key));
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPanel(key,s){
  let html = '';
  html += `<div class="section-head"><h1>${esc(s.label)}</h1><div class="meta">${esc(DATA.meta.date)} · ${esc(DATA.meta.edition)}</div></div>`;
  html += `<div class="ai-summary" data-section="${key}"><div class="label">AI Summary</div><p>${esc(s.ai_summary)}</p></div>`;

  if(key==='wars'){
    html += s.theatres.map(renderTheatre).join('');
  } else if(key==='hantavirus'){
    html += renderStatBar(s.stats);
    html += `<div class="grid">${s.stories.map(c=>renderCard(c,'health')).join('')}</div>`;
  } else if(key==='cybersecurity'){
    html += `<div class="grid">${s.stories.map(c=>renderCyberCard(c)).join('')}</div>`;
  } else if(key==='singapore'){
    html += `<div class="grid">${s.stories.map(c=>renderCard(c,'sg')).join('')}</div>`;
  } else {
    html += `<div class="grid">${s.stories.map(c=>renderCard(c,'')).join('')}</div>`;
  }
  return html;
}

function renderCard(c,cls){
  return `<article class="card ${cls}">
    <div class="cat">${esc(c.category||'News')}</div>
    <h3>${esc(c.headline)}</h3>
    <p class="summary">${esc(c.summary)}</p>
    <div class="meta-row">
      <span>${esc(c.source||'')}</span>
      <a href="${esc(c.url)}" target="_blank" rel="noopener">Read →</a>
    </div>
  </article>`;
}

function renderCyberCard(c){
  return `<article class="card cyber">
    <div class="cve-row">
      ${c.cve?`<span class="cve-pill">${esc(c.cve)}</span>`:''}
      ${c.cvss!=null?`<span class="cvss">CVSS ${esc(c.cvss)}</span>`:''}
      ${c.severity?`<span class="badge ${esc(c.severity)}">${esc(c.severity)}</span>`:''}
    </div>
    <div class="cat">${esc(c.category||'Security')}</div>
    <h3>${esc(c.headline)}</h3>
    <p class="summary">${esc(c.summary)}</p>
    <div class="meta-row">
      <span>${esc(c.source||'')}</span>
      <a href="${esc(c.url)}" target="_blank" rel="noopener">Read →</a>
    </div>
  </article>`;
}

function renderTheatre(t){
  const items = t.timeline.map(ev=>{
    const today = ev.today?' today':'';
    return `<div class="timeline-item${today}"><div class="date">${esc(ev.date)}</div><div class="event">${esc(ev.event)}</div></div>`;
  }).join('');
  return `<div class="theatre">
    <div class="theatre-head">
      <h3>${esc(t.name)}</h3>
      <div class="theatre-status">${esc(t.status)}</div>
    </div>
    <div class="timeline">${items}</div>
  </div>`;
}

function renderStatBar(stats){
  if(!stats) return '';
  return `<div class="stat-bar">
    <div class="stat-card"><div class="num">${stats.cases}</div><div class="lbl">Confirmed + Suspected</div></div>
    <div class="stat-card"><div class="num">${stats.deaths}</div><div class="lbl">Deaths</div></div>
    <div class="stat-card"><div class="num">${stats.countries}+</div><div class="lbl">Countries Tracking</div></div>
  </div>`;
}
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--bg2:#0e1117;--bg3:#141820;
  --gold:#d4a84b;--gold-dim:#9a7832;
  --green:#34d399;--red:#f16a6a;
  --text:#eef0f5;--text-dim:#8a8fa0;--border:#1e2330;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;line-height:1.6;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .6s ease both}
.f1{animation-delay:.05s}.f2{animation-delay:.13s}.f3{animation-delay:.21s}
.f4{animation-delay:.29s}.f5{animation-delay:.37s}.f6{animation-delay:.45s}
.f7{animation-delay:.53s}.f8{animation-delay:.61s}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(8,10,15,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px}
.topbar-logo{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.topbar-title span{color:var(--gold)}
.topbar-meta{color:var(--text-dim);font-size:12px;margin-left:auto;display:flex;align-items:center;gap:10px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.container{max-width:1120px;margin:0 auto;padding:0 20px}
section{padding:32px 0}
h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
h2::after{content:'';flex:1;height:1px;background:var(--border)}

/* HERO */
.hero{padding:40px 0 28px}
.hero-price{font-family:'Syne',sans-serif;font-size:clamp(48px,8vw,80px);font-weight:800;line-height:1;letter-spacing:-2px}
.hero-change{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:6px;font-size:16px;font-weight:600;margin-top:8px}
.hero-change.up{background:rgba(52,211,153,.15);color:var(--green)}
.hero-change.dn{background:rgba(241,106,106,.15);color:var(--red)}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:28px}
.hstat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.hstat-l{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.hstat-v{font-size:18px;font-weight:600}
.hstat-v.gold{color:var(--gold)}
.hstat-s{font-size:11px;color:var(--text-dim);margin-top:2px}

/* RECOMMENDATION */
.rec{border-radius:14px;padding:28px 32px}
.rec.hold{background:linear-gradient(135deg,rgba(212,168,75,.18),rgba(212,168,75,.08));border:1px solid rgba(212,168,75,.35)}
.rec.buy{background:linear-gradient(135deg,rgba(52,211,153,.18),rgba(52,211,153,.08));border:1px solid rgba(52,211,153,.35)}
.rec.sell{background:linear-gradient(135deg,rgba(241,106,106,.18),rgba(241,106,106,.08));border:1px solid rgba(241,106,106,.35)}
.rec-top{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:20px}
.rec-sig{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;letter-spacing:-1px;line-height:1}
.hold .rec-sig{color:var(--gold)}.buy .rec-sig{color:var(--green)}.sell .rec-sig{color:var(--red)}
.rec-badges{display:flex;flex-wrap:wrap;gap:8px}
.badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid}
.bg{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.3)}
.br{background:rgba(241,106,106,.12);color:var(--red);border-color:rgba(241,106,106,.3)}
.bo{background:rgba(212,168,75,.12);color:var(--gold);border-color:rgba(212,168,75,.3)}
.bd{background:rgba(138,143,160,.12);color:var(--text-dim);border-color:rgba(138,143,160,.2)}
.rec-scores{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.rec-score{font-size:13px}
.rec-score .num{font-weight:700;font-size:18px}
.rec-score .ng{color:var(--green)}.rec-score .nr{color:var(--red)}
.rec-reason{font-size:14px;line-height:1.7;color:var(--text-dim);margin-bottom:16px}
.rec-reason strong{color:var(--text)}
.rec-risk{font-size:13px;color:var(--text-dim);padding:12px 16px;background:rgba(241,106,106,.07);border-left:3px solid var(--red);border-radius:0 6px 6px 0;margin-bottom:14px}
.rec-disc{font-size:11px;color:#555a6e;line-height:1.5}

/* CHART */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px}
.chart-wrap{position:relative;height:200px}

/* TECH PILLS */
.tpills{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px}
.tpill{display:flex;flex-direction:column;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);min-width:100px}
.tpill-l{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.tpill-v{font-size:13px;font-weight:600}
.tg{color:var(--green)}.tr{color:var(--red)}.to{color:var(--gold)}.td{color:var(--text-dim)}

/* RSI */
.rsi-wrap{margin:16px 0 8px}
.rsi-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.rsi-fill{height:100%;border-radius:4px}

/* NEWS */
.sent-banner{padding:16px 20px;border-radius:10px;margin-bottom:20px;font-size:14px;line-height:1.6}
.sent-banner.bullish{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2)}
.sent-banner.cautious{background:rgba(212,168,75,.08);border:1px solid rgba(212,168,75,.2)}
.sent-banner.bearish{background:rgba(241,106,106,.08);border:1px solid rgba(241,106,106,.2)}
.sent-banner.neutral{background:rgba(138,143,160,.08);border:1px solid rgba(138,143,160,.2)}
.sent-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.news-grid{display:grid;gap:14px}
.news-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:border-color .2s}
.news-card:hover{border-color:var(--gold-dim)}
.news-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
.news-hl{font-size:14px;font-weight:600;flex:1;line-height:1.4}
.npill{flex-shrink:0;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.npill.bullish{background:rgba(52,211,153,.15);color:var(--green)}
.npill.bearish{background:rgba(241,106,106,.15);color:var(--red)}
.npill.neutral{background:rgba(138,143,160,.15);color:var(--text-dim)}
.news-sum{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:10px}
.news-meta{font-size:11px;color:#555a6e}

/* ANALYSIS */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.agrid{grid-template-columns:1fr}}
.acard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px}
.aperiod{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.achg{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;margin-bottom:6px}
.achg.up{color:var(--green)}.achg.dn{color:var(--red)}
.ameta{font-size:12px;color:var(--text-dim);margin-bottom:14px}
.atrend{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:14px}
.atrend.up{background:rgba(52,211,153,.1);color:var(--green)}
.atrend.dn{background:rgba(241,106,106,.1);color:var(--red)}
.atrend.sd{background:rgba(212,168,75,.1);color:var(--gold)}
.ma-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.mpill{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600}
.mpill.above{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.mpill.below{background:rgba(241,106,106,.12);color:var(--red);border:1px solid rgba(241,106,106,.25)}
.kl-wrap{margin:14px 0}
.kl{padding:10px 14px;border-radius:8px;margin-bottom:8px}
.kl.sup{background:rgba(52,211,153,.06);border-left:3px solid var(--green)}
.kl.res{background:rgba(241,106,106,.06);border-left:3px solid var(--red)}
.kl-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.kl-lbl{font-size:11px;text-transform:uppercase;font-weight:700;letter-spacing:.06em}
.kl.sup .kl-lbl{color:var(--green)}.kl.res .kl-lbl{color:var(--red)}
.kl-price{font-size:16px;font-weight:700}
.kl-why{font-size:12px;color:var(--text-dim);line-height:1.5}
.sigs{list-style:none;margin-bottom:14px}
.sigs li{font-size:12px;color:var(--text-dim);padding:4px 0 4px 16px;position:relative;line-height:1.5}
.sigs li::before{content:"→";position:absolute;left:0;color:var(--gold)}
.asum{font-size:13px;color:var(--text-dim);line-height:1.6;border-top:1px solid var(--border);padding-top:14px;margin-top:4px}
.evlist{list-style:none;margin:10px 0}
.evlist li{font-size:12px;color:var(--text-dim);padding:5px 0 5px 16px;position:relative;border-bottom:1px solid var(--border)}
.evlist li:last-child{border-bottom:none}
.evlist li::before{content:"◆";position:absolute;left:0;color:var(--gold-dim);font-size:8px;top:7px}

/* OUTLOOK */
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.ogrid{grid-template-columns:1fr}}
.ocard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px}
.abar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin:10px 0}
.abar-b{background:var(--green)}.abar-h{background:var(--gold)}.abar-s{background:var(--red)}
.abar-lbels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim)}
.abar-lbels span{display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.titem{padding:10px 12px;background:var(--bg3);border-radius:8px}
.tlbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.tval{font-size:16px;font-weight:700}
.tfirm{font-size:10px;color:var(--text-dim);margin-top:1px}
.rc-note{font-size:12px;color:var(--text-dim);padding:10px 14px;background:rgba(212,168,75,.06);border:1px solid rgba(212,168,75,.15);border-radius:8px;margin:10px 0;line-height:1.5}
.earn-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin:14px 0}
.earn-date{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
.earn-ests{display:flex;gap:20px;flex-wrap:wrap;margin-top:6px}
.earn-est{font-size:12px;color:var(--text-dim)}
.earn-est strong{color:var(--text)}
.cat-list{display:grid;gap:12px}
.cat{background:var(--bg3);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.cat-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.cat-ev{font-size:13px;font-weight:600;flex:1}
.cat-tm{font-size:11px;color:var(--text-dim);flex-shrink:0}
.cat-det{font-size:12px;color:var(--text-dim);line-height:1.5}
.mlist{display:grid;gap:10px}
.mitem{padding:12px 14px;border-radius:8px}
.mitem.bearish{background:rgba(241,106,106,.06);border-left:3px solid var(--red)}
.mitem.bullish{background:rgba(52,211,153,.06);border-left:3px solid var(--green)}
.mitem-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mfact{font-size:13px;font-weight:600}
.mdet{font-size:12px;color:var(--text-dim);line-height:1.5}
.out-sum{font-size:13px;color:var(--text-dim);line-height:1.7;padding:18px 0;border-top:1px solid var(--border)}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:32px 0;text-align:center;font-size:11px;color:#555a6e;line-height:1.7}
footer a{color:var(--gold-dim);text-decoration:none}

@media(max-width:640px){
  .topbar{padding:10px 16px}.container{padding:0 14px}
  .hero-price{font-size:52px}.rec{padding:20px}.rec-sig{font-size:36px}
  .agrid,.ogrid{grid-template-columns:1fr}.tgrid{grid-template-columns:1fr}
}
</style>
